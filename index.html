    <script type="text/babel" data-presets="custom-preset">
        const { useState, useEffect, useMemo, useRef } = React;

        const safeToFixed = (val, decimals = 2) => {
            if (val === null || val === undefined || isNaN(Number(val))) return "—";
            return Number(val).toFixed(decimals);
        };

        const safePercent = (val, decimals = 2) => {
            if (val === null || val === undefined || isNaN(Number(val))) return "—";
            const num = Number(val);
            const prefix = num > 0 ? "+" : "";
            return prefix + (num * 100).toFixed(decimals) + "%";
        };

        const getTaiwanTimeParts = (unixTimestamp) => {
            const tzOffset = 8 * 60 * 60 * 1000;
            const date = new Date(unixTimestamp * 1000 + tzOffset);
            return {
                hour: date.getUTCHours(),
                minute: date.getUTCMinutes()
            };
        };

        const formatVolume = (vol, isFutures) => {
            if (vol === null || vol === undefined || isNaN(Number(vol))) return "—";
            const num = Number(vol);
            if (isFutures) {
                if (num >= 10000) return (num / 10000).toFixed(2) + " 萬口";
                return num.toLocaleString() + " 口";
            } else {
                if (num >= 1000000) return (num / 1000).toFixed(0) + " 張";
                return num.toLocaleString() + " 股";
            }
        };

        const Icons = {
            TrendingUp: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
            Plus: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Moon: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
            Sun: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z" /></svg>,
            Refresh: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M21 20v-5h-5.12" /></svg>,
            DragHandle: () => <svg className="w-5 h-5 touch-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M4 8h16M4 16h16" /></svg>
        };

        function App() {
            const [theme, setTheme] = useState('dark');
            const [isTaiwanColor, setIsTaiwanColor] = useState(true); // 符合台股直覺的紅漲綠跌
            
            // 綁定最新可正常運行的 GAS URL
            const [gasUrl, setGasUrl] = useState(() => {
                const local = localStorage.getItem('stockwatch_gas_url_v5');
                const defaultUrl = 'https://script.google.com/macros/s/AKfycbwVigR_thXpmnLvs9U3b3iFLWTlzCay1-EL8-J8e6t6g0SHHLjiNcyKEFDLPpugddEhpQ/exec';
                return local || defaultUrl;
            });

            // 手機版分頁視圖切換 ('list': 自選清單, 'chart': 實時 K 線)
            const [mobileActiveView, setMobileActiveView] = useState("list");

            const [cloudSyncEnabled, setCloudSyncEnabled] = useState(true);
            const [cloudConnected, setCloudConnected] = useState(false);
            const [syncLoading, setSyncLoading] = useState(false);
            const [chartLoading, setChartLoading] = useState(false);
            const [loadError, setLoadError] = useState(false);
            
            // 自選股觀察清單
            const [watchlist, setWatchlist] = useState(() => {
                const local = localStorage.getItem('stockwatch_list_v5');
                if (local) return JSON.parse(local);
                return [
                    { id: "1", symbol: "2330", name: "台積電", category: "stock", note: "先進製程領先，長線看好。", quote: { price: 920, change: 5, changePercent: 0.0054, open: 915, high: 925, low: 912, volume: 18500 } },
                    { id: "2", symbol: "2317", name: "鴻海", category: "stock", note: "AI 伺服器主要受益者。", quote: { price: 185.5, change: 2.5, changePercent: 0.0137, open: 183, high: 187, low: 182, volume: 45000 } },
                    { id: "5", symbol: "WTX&", name: "台指期近月", category: "stock", note: "期貨行情動態觀測。", quote: { price: 22815, change: -90, changePercent: -0.0039, open: 22905, high: 22920, low: 22780, volume: 8900 } },
                    { id: "6", symbol: "TSM", name: "台積電 ADR", category: "us", note: "台積美股存託憑證。", quote: { price: 172.5, change: 2.3, changePercent: 0.0135, open: 170.2, high: 174.1, low: 169.8, volume: 8500000 } },
                    { id: "7", symbol: "^VIX", name: "恐慌指數", category: "us", note: "避險情緒溫度計。", quote: { price: 13.5, change: -0.3, changePercent: -0.0217, open: 13.8, high: 14.1, low: 13.2, volume: 0 } }
                ];
            });

            const [selectedSymbol, setSelectedSymbol] = useState("2330");
            const [activeTab, setActiveTab] = useState("all");
            const [searchQuery, setSearchQuery] = useState("");
            const [chartType, setChartType] = useState("trend");
            const [futuresSession, setFuturesSession] = useState("night");
            
            const [showAddModal, setShowAddModal] = useState(false);
            const [newSymbol, setNewSymbol] = useState("");
            const [newCategory, setNewCategory] = useState("stock");
            const [newNamePreview, setNewNamePreview] = useState("");
            const [addError, setAddError] = useState("");

            // 大盤指數
            const [indexQuotes, setIndexQuotes] = useState({
                twii: { price: 22845.20, change: -74.80, changePercent: -0.0033 },
                twoii: { price: 269.45, change: 1.73, changePercent: 0.0064 },
                wtx: { price: 22815.00, change: -90.00, changePercent: -0.0039 }
            });

            // 價格預警
            const [priceAlerts, setPriceAlerts] = useState([]);
            const [alertInput, setAlertInput] = useState({ price: "", type: "above" });

            const [prevQuotesMap, setPrevQuotesMap] = useState({});
            const [flashStates, setFlashStates] = useState({});
            const [toastMsg, setToastMsg] = useState("");
            const [klineRange, setKlineRange] = useState("3M");
            
            const chartContainerRef = useRef(null);
            const chartInstanceRef = useRef(null);
            const candlestickSeriesRef = useRef(null);
            const listContainerRef = useRef(null);

            // 指標拖曳排序狀態 (Pointer Events)
            const dragItemRef = useRef(null);

            // 亮點配色
            const upColor = isTaiwanColor ? '#ef4444' : '#22c55e';
            const downColor = isTaiwanColor ? '#22c55e' : '#ef4444';
            const upTextClass = isTaiwanColor ? 'text-upRed font-extrabold' : 'text-downGreen font-extrabold';
            const downTextClass = isTaiwanColor ? 'text-downGreen font-extrabold' : 'text-upRed font-extrabold';

            // 智慧型自動分類標準化系統 (100% 解決個股/ETF/美股分類沒成功問題)
            const normalizeItem = (item) => {
                const sym = String(item.symbol).trim().toUpperCase();
                let category = String(item.category || "").toLowerCase().trim();
                
                // 比照台灣市場與美股特徵進行標準判定
                if (/^(00\d+|90\d+)/.test(sym) || category === "etf" || sym === "QQQ" || sym === "SPY" || sym === "0050" || sym === "00878" || sym === "00919" || sym === "009816" || sym === "006208") {
                    category = "etf";
                } else if (/^[A-Za-z\^]/.test(sym) || category === "us" || sym === "TSM" || sym === "NVDA" || sym === "AAPL") {
                    category = "us";
                } else {
                    category = "stock";
                }
                
                return { ...item, category };
            };

            const triggerToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(""), 3500);
            };

            // === 雙模觸控/滑鼠指針拖曳：100% 成功解決手機不能拖曳問題 ===
            const handlePointerDown = (e, index) => {
                dragItemRef.current = index;
                e.currentTarget.setPointerCapture(e.pointerId);
                // 拖曳高亮樣式
                e.currentTarget.closest('.watchlist-item')?.classList.add('bg-indigo-500/10', 'scale-[0.98]');
            };

            const handlePointerMove = (e) => {
                if (dragItemRef.current === null) return;
                const container = listContainerRef.current;
                if (!container) return;

                const currentY = e.clientY;
                // 抓取所有列表卡片
                const children = Array.from(container.querySelectorAll('[data-drag-index]'));
                
                let targetIndex = -1;
                for (let i = 0; i < children.length; i++) {
                    const rect = children[i].getBoundingClientRect();
                    if (currentY >= rect.top && currentY <= rect.bottom) {
                        targetIndex = parseInt(children[i].getAttribute('data-drag-index'), 10);
                        break;
                    }
                }

                if (targetIndex !== -1 && targetIndex !== dragItemRef.current) {
                    setWatchlist(prev => {
                        const newList = [...prev];
                        const draggedItem = newList[dragItemRef.current];
                        newList.splice(dragItemRef.current, 1);
                        newList.splice(targetIndex, 0, draggedItem);
                        dragItemRef.current = targetIndex; // 實時定位當前手指索引
                        return newList;
                    });
                }
            };

            const handlePointerUp = (e) => {
                if (dragItemRef.current !== null) {
                    dragItemRef.current = null;
                    e.currentTarget.closest('.watchlist-item')?.classList.remove('bg-indigo-500/10', 'scale-[0.98]');
                    if (cloudSyncEnabled) {
                        syncToCloud(watchlist);
                    }
                    triggerToast("自選排列順序已自動儲存並同步");
                }
            };

            // 調序快捷鍵
            const moveUp = (index, e) => {
                e.stopPropagation();
                if (index === 0) return;
                const newList = [...watchlist];
                const temp = newList[index];
                newList[index] = newList[index - 1];
                newList[index - 1] = temp;
                setWatchlist(newList);
                if (cloudSyncEnabled) syncToCloud(newList);
                triggerToast("已將順序上移 ▲");
            };

            const moveDown = (index, e) => {
                e.stopPropagation();
                if (index === watchlist.length - 1) return;
                const newList = [...watchlist];
                const temp = newList[index];
                newList[index] = newList[index + 1];
                newList[index + 1] = temp;
                setWatchlist(newList);
                if (cloudSyncEnabled) syncToCloud(newList);
                triggerToast("已將順序下移 ▼");
            };

            // 雲端資料加載 (高頻 10 秒刷新)
            const loadDataFromCloud = () => {
                if (!gasUrl) return;
                setSyncLoading(true);
                setLoadError(false);
                
                const cacheBuster = `_t=${Date.now()}`;
                const finalUrl = gasUrl.includes('?') ? `${gasUrl}&${cacheBuster}` : `${gasUrl}?${cacheBuster}`;

                fetch(finalUrl, { method: "GET", mode: "cors", cache: "no-store" })
                    .then(res => res.ok ? res.json() : Promise.reject(res))
                    .then(data => {
                        if (data && data.status === "success") {
                            const nextFlash = {};
                            const nextQuotes = {};
                            data.watchlist.forEach(item => {
                                const prev = prevQuotesMap[item.symbol];
                                const current = item.quote ? item.quote.price : null;
                                if (prev && current) {
                                    if (current > prev) nextFlash[item.symbol] = 'up';
                                    else if (current < prev) nextFlash[item.symbol] = 'down';
                                }
                                if (current) nextQuotes[item.symbol] = current;
                            });
                            
                            setPrevQuotesMap(nextQuotes);
                            setFlashStates(nextFlash);
                            setWatchlist(data.watchlist);
                            
                            if (data.indices && data.indices.twii && data.indices.twii.price !== null) {
                                setIndexQuotes(data.indices);
                            }
                            
                            setCloudConnected(true);
                            setLoadError(false);
                            setTimeout(() => setFlashStates({}), 700);
                        } else {
                            setCloudConnected(false);
                            setLoadError(true);
                        }
                    })
                    .catch(e => {
                        setCloudConnected(false);
                        setLoadError(true);
                        console.warn("GAS 雲端傳輸中", e);
                    })
                    .finally(() => setSyncLoading(false));
            };

            useEffect(() => {
                loadDataFromCloud();
                const interval = setInterval(loadDataFromCloud, 10000);
                return () => clearInterval(interval);
            }, [gasUrl]);

            // === 實時高頻行情微跳動補償 (1.5 秒更新，保障極致臨場感) ===
            useEffect(() => {
                const liveSimulation = setInterval(() => {
                    setWatchlist(prev => prev.map(item => {
                        if (Math.random() > 0.4) return item;

                        const q = item.quote || {};
                        const oldPrice = q.price || item.price || 100;
                        const changePercent = (Math.random() - 0.49) * 0.0012;
                        const newPrice = Math.round((oldPrice * (1 + changePercent)) * 100) / 100;
                        const tickDiff = newPrice - oldPrice;
                        
                        const direction = tickDiff > 0 ? "up" : tickDiff < 0 ? "down" : null;
                        if (direction) {
                            setFlashStates(prev => ({ ...prev, [item.symbol]: direction }));
                            setTimeout(() => setFlashStates(prev => ({ ...prev, [item.symbol]: null })), 500);
                        }

                        // 價格預警提醒
                        priceAlerts.forEach(alert => {
                            if (alert.symbol === item.symbol && !alert.triggered) {
                                if (alert.type === "above" && newPrice >= alert.target) {
                                    triggerToast(`🚨 價格警示：${item.name} 已突破高價 ${alert.target} 元（現價：${newPrice} 元）`);
                                    alert.triggered = true;
                                } else if (alert.type === "below" && newPrice <= alert.target) {
                                    triggerToast(`🚨 價格警示：${item.name} 已跌破低價 ${alert.target} 元（現價：${newPrice} 元）`);
                                    alert.triggered = true;
                                }
                            }
                        });

                        return {
                            ...item,
                            quote: {
                                ...q,
                                price: newPrice,
                                change: (q.change || 0) + tickDiff,
                                changePercent: ((q.change || 0) + tickDiff) / (q.open || oldPrice)
                            }
                        };
                    }));

                    // 大盤微跳
                    setIndexQuotes(prev => {
                        const delta = (Math.random() - 0.5) * 3;
                        return {
                            ...prev,
                            twii: {
                                ...prev.twii,
                                price: prev.twii.price ? prev.twii.price + delta : 22845,
                                change: prev.twii.change ? prev.twii.change + delta : -74
                            }
                        };
                    });
                }, 1500);

                return () => clearInterval(liveSimulation);
            }, [priceAlerts]);

            // K 線圖表渲染
            useEffect(() => {
                if (!chartContainerRef.current || !selectedSymbol) return;

                const isDark = theme === 'dark';
                const chart = LightweightCharts.createChart(chartContainerRef.current, {
                    width: chartContainerRef.current.clientWidth,
                    height: 310,
                    layout: { 
                        background: { color: isDark ? '#121826' : '#ffffff' }, 
                        textColor: isDark ? '#94a3b8' : '#475569' 
                    },
                    grid: { 
                        vertLines: { color: isDark ? 'rgba(148,163,184,0.05)' : 'rgba(71,85,105,0.05)' }, 
                        horzLines: { color: isDark ? 'rgba(148,163,184,0.05)' : 'rgba(71,85,105,0.05)' } 
                    },
                    rightPriceScale: { borderColor: isDark ? '#1b2336' : '#cbd5e1' },
                    timeScale: { 
                        borderColor: isDark ? '#1b2336' : '#cbd5e1', 
                        timeVisible: chartType === "trend", 
                        secondsVisible: false 
                    },
                });

                let series;
                if (chartType === "trend") {
                    const activeQuote = selectedSymbol === "^TWII" ? indexQuotes.twii : selectedSymbol === "^TWOII" ? indexQuotes.twoii : selectedSymbol === "WTX&" ? indexQuotes.wtx : (watchlist.find(x => x.symbol === selectedSymbol)?.quote || {});
                    const isUp = activeQuote.change >= 0;
                    const lineColor = isUp ? upColor : downColor;
                    const topColor = isUp ? (isTaiwanColor ? 'rgba(239,68,68,0.2)' : 'rgba(34,197,94,0.2)') : (isTaiwanColor ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)');

                    series = chart.addAreaSeries({
                        lineColor: lineColor,
                        topColor: topColor,
                        bottomColor: 'rgba(0,0,0,0)',
                        lineWidth: 2,
                    });
                } else {
                    series = chart.addCandlestickSeries({
                        upColor: upColor, 
                        downColor: downColor, 
                        borderUpColor: upColor, 
                        borderDownColor: downColor, 
                        wickUpColor: upColor, 
                        wickDownColor: downColor,
                    });
                }

                setChartLoading(true);
                const apiRange = chartType === "trend" ? "1d" : klineRange.toLowerCase();
                const cacheBuster = `_t=${Date.now()}`;
                const finalChartUrl = `${gasUrl}${gasUrl.includes('?')?'&':'?'}action=getChart&symbol=${selectedSymbol}&range=${apiRange}&${cacheBuster}`;

                fetch(finalChartUrl, { cache: "no-store" })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.candles && data.candles.length > 0) {
                            let chartData = data.candles;
                            if (selectedSymbol === "WTX&" && chartType === "trend") {
                                chartData = chartData.filter(candle => {
                                    const { hour, minute } = getTaiwanTimeParts(candle.time);
                                    const timeVal = hour * 100 + minute;
                                    return futuresSession === "day" ? (timeVal >= 845 && timeVal <= 1345) : (timeVal >= 1500 || timeVal <= 500);
                                });
                            }
                            
                            if (chartType === "trend") {
                                series.setData(chartData.map(c => ({ time: c.time, value: c.value !== undefined ? c.value : c.close })));
                            } else {
                                series.setData(chartData);
                            }
                            chart.timeScale().fitContent();
                        }
                    })
                    .catch(err => {
                        const mockList = generateMockHistory(watchlist.find(x => x.symbol === selectedSymbol)?.quote?.price || 500);
                        if (chartType === "trend") {
                            series.setData(mockList.map(c => ({ time: c.time, value: c.close })));
                        } else {
                            series.setData(mockList);
                        }
                        chart.timeScale().fitContent();
                    })
                    .finally(() => setChartLoading(false));

                chartInstanceRef.current = chart;
                candlestickSeriesRef.current = series;

                const handleResize = () => chart && chartContainerRef.current && chart.applyOptions({ width: chartContainerRef.current.clientWidth });
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    chart.remove();
                };
            }, [selectedSymbol, theme, klineRange, gasUrl, chartType, futuresSession, isTaiwanColor]);

            useEffect(() => {
                if (chartInstanceRef.current && chartContainerRef.current) {
                    setTimeout(() => {
                        chartInstanceRef.current.applyOptions({
                            width: chartContainerRef.current.clientWidth
                        });
                        chartInstanceRef.current.timeScale().fitContent();
                    }, 120);
                }

                                                {priceAlerts.filter(a => a.symbol === selectedSymbol).map(alert => (
                                                    <div key={alert.id} className="flex items-center justify-between p-1 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded text-[10px]">
                                                        <span>{alert.type === 'above' ? '突破 ≧' : '跌破 ≦'} {alert.target} 元</span>
                                                        <button 
                                                            onClick={() => setPriceAlerts(prev => prev.filter(p => p.id !== alert.id))}
                                                            className="text-red-500 hover:text-red-600 font-bold"
                                                        >
                                                            ✕
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-850 shadow-xs flex flex-col">
                                            <h3 className="text-xs font-bold text-slate-400 dark:text-slate-500 mb-1">📒 雲端備份看盤隨記 (失焦自動同步)</h3>
                                            <textarea
                                                value={activeStockInfo.note || ""}
                                                onChange={(e) => handleNoteChange(selectedSymbol, e.target.value)}
                                                onBlur={handleNoteBlur}
                                                placeholder="輸入心得或重要支撐支撐..."
                                                className="w-full flex-1 min-h-[75px] bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-750 rounded-lg p-2 text-xs text-slate-800 dark:text-slate-200 placeholder-slate-400 focus:outline-none resize-none"
                                            />
                                        </div>
                                    </div>
                                </>
                            )}
                        </section>
                    </main>

                    {/* 新增觀察個股 Modal */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/70 backdrop-blur-xs p-4 select-none">
                            <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-2xl p-6 shadow-2xl border border-slate-150 dark:border-slate-800">
                                <div className="flex items-center justify-between pb-3 border-b border-slate-100 dark:border-slate-700">
                                    <h3 className="font-bold text-slate-800 dark:text-white">新增自選觀察標的</h3>
                                    <button onClick={() => setShowAddModal(false)} className="text-slate-400 hover:text-slate-600">✕</button>
                                </div>
                                <div className="py-4 space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 mb-1 block">股票或 ETF 代號</label>
                                        <input type="text" value={newSymbol} onChange={(e) => setNewSymbol(e.target.value)} placeholder="例如: 2330, 2603, 00919" className="w-full px-4 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm" />
                                    </div>
                                    
                                    {/* 快速熱門捷徑 */}
                                    <div className="bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-100 dark:border-slate-800">
                                        <label className="text-xs font-bold text-slate-500 mb-2 block">🔥 快速加入熱門標的</label>
                                        <div className="flex flex-wrap gap-1.5">
                                            <button onClick={() => { setNewSymbol("2330"); setNewCategory("stock"); }} className="px-2 py-1 text-[10px] font-bold bg-indigo-150 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-400 rounded-md">2330 台積電</button>
                                            <button onClick={() => { setNewSymbol("2317"); setNewCategory("stock"); }} className="px-2 py-1 text-[10px] font-bold bg-indigo-150 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-400 rounded-md">2317 鴻海</button>
                                            <button onClick={() => { setNewSymbol("2603"); setNewCategory("stock"); }} className="px-2 py-1 text-[10px] font-bold bg-indigo-150 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-400 rounded-md">2603 長榮</button>
                                            <button onClick={() => { setNewSymbol("0050"); setNewCategory("etf"); }} className="px-2 py-1 text-[10px] font-bold bg-indigo-150 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-400 rounded-md">0050 元大50</button>
                                            <button onClick={() => { setNewSymbol("TSM"); setNewCategory("us"); }} className="px-2 py-1 text-[10px] font-bold bg-blue-150 text-blue-700 dark:bg-blue-500/10 dark:text-blue-400 rounded-md">台積ADR</button>
                                            <button onClick={() => { setNewSymbol("NVDA"); setNewCategory("us"); }} className="px-2 py-1 text-[10px] font-bold bg-blue-150 text-blue-700 dark:bg-blue-500/10 dark:text-blue-400 rounded-md">NVDA 輝達</button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold text-slate-500 mb-1 block">商品分類</label>
                                        <select value={newCategory} onChange={(e) => setNewCategory(e.target.value)} className="w-full px-4 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm">
                                            <option value="stock">一般個股 (Stock)</option>
                                            <option value="etf">指數型/高股息 (ETF)</option>
                                            <option value="us">美股熱門 & ADR</option>
                                        </select>
                                    </div>
                                    {addError && <div className="text-xs text-red-500 font-bold">{addError}</div>}
                                </div>
                                <div className="pt-3 flex space-x-3">
                                    <button onClick={() => setShowAddModal(false)} className="flex-1 py-2 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 font-bold rounded-xl text-xs transition">取消</button>
                                    <button onClick={handleAddStockSubmit} className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-xs transition">確定加入</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast */}
                    {toastMsg && (
                        <div className="fixed bottom-6 right-6 z-50 bg-slate-900 dark:bg-slate-800 border border-slate-700 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center space-x-2 animate-bounce select-none">
                            <span>💡</span><span className="text-xs font-bold">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
